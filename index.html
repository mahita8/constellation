<!DOCTYPE html>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #04050f;
    color: #e8e4d9;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #starfield {
    position: fixed;

    width: 100%; height: 100%;

  }

  .wrapper {

    align-items: center;

  .header {

  .header h1 {

  @keyframes pulse {
    0%   { r: 10; opacity: 0.6; }

    position: absolute;

  .panel-glyph {
    font-size: 1.4rem;
    margin-bottom: 0.6rem;
    display: block;
  }

  .panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: #f5f0e8;
    margin-bottom: 0.6rem;
  }

    font-size: 0.78rem;

  .panel-tag {
    display: inline-block;

<script>
// ── Star metadata (prompts + display config) ──────────────────────────────────
const stars = {
  space: {
    glyph: '✦',
    title: 'Space & Stars',
    color: '#c9b8f0',
    tag: 'D3.js · Gaia ESA · data as art',
    prompt: `You are writing a 2–3 sentence first-person micro-story for a creative portfolio. 
Write in the voice of Mahita Maddipati, a creative technologist and software engineer. 
Topic: her love of space and astronomy, specifically that she built a D3.js interactive stellar distribution visualization using the Gaia ESA dataset — not for a class, purely out of curiosity and love for the data. 
Tone: poetic, personal, slightly wonder-struck. No bullet points. No hashtags. No em-dashes. End with a single resonant observation.`
  },
  code: {
    glyph: '⟨/⟩',
    title: 'Code as material',
    color: '#8dd8c8',
    tag: 'React · TypeScript · Python · FastAPI',
    prompt: `You are writing a 2–3 sentence first-person micro-story for a creative portfolio.
Write in the voice of Mahita Maddipati, a software engineer who thinks of code as a creative material like paint or clay, not just a tool.
Her stack is React, TypeScript, Python, and FastAPI. She started as a visual/creative person and came to code later.
Tone: confident, creative, a little philosophical. No bullet points. No hashtags. No em-dashes. End with a single resonant observation about why she codes.`
  },
  art: {
    glyph: '◈',
    title: 'Art & Design',
    color: '#f0c98a',
    tag: 'Procreate · Figma · UX · motion',
    prompt: `You are writing a 2–3 sentence first-person micro-story for a creative portfolio.
Write in the voice of Mahita Maddipati. She hand-draws and animates all her design assets in Procreate before writing a single line of code. She holds three Google UX Design Professional Certificates and uses Figma daily.
Tone: warm, artistic, grounded in craft. No bullet points. No hashtags. No em-dashes. End with a single line about how art and engineering are the same impulse.`
  },
  culture: {
    glyph: '◎',
    title: 'South Indian roots',
    color: '#f0a0a0',
    tag: 'culture · food · illustration · shipped',
    prompt: `You are writing a 2–3 sentence first-person micro-story for a creative portfolio.
Write in the voice of Mahita Maddipati. She built an app called DoRupay Dosa — a joyful app that lets you "send" a dosa to someone you're missing. She's South Indian, moved away from family, and food is her culture's love language. She hand-drew every asset in Procreate and vibe-coded the app herself.
Tone: tender, specific, culturally grounded. No bullet points. No hashtags. No em-dashes. End with a line about presence, distance, and care.`
  },
  research: {
    glyph: '∿',
    title: 'Research',
    color: '#a8d4f5',
    tag: 'neural compression · dictionary learning · DSP',
    prompt: `You are writing a 2–3 sentence first-person micro-story for a creative portfolio.
Write in the voice of Mahita Maddipati. She does neural electrophysiology data compression research at Virginia Tech — compressing spike waveforms using dictionary learning so machines can classify neural signals efficiently. She also worked on hyperspectral satellite image compression. She sees both as the same problem: find the essential signal, discard the noise.
Tone: precise, quietly curious, a little lyrical. No bullet points. No hashtags. No em-dashes. End with an observation about signal and noise that applies beyond research.`
  },
  photo: {
    glyph: '⬡',
    title: 'Photography',
    color: '#b8d4a0',
    tag: 'visual composition · light · observation',
    prompt: `You are writing a 2–3 sentence first-person micro-story for a creative portfolio.
Write in the voice of Mahita Maddipati. Photography was her first creative language — before design, before code. It taught her to see: negative space, light, the moment before the moment. That visual literacy now lives in every interface she builds.
Tone: reflective, sensory, grounded. No bullet points. No hashtags. No em-dashes. End with a single line connecting photography to interface design.`
  },
  making: {
    glyph: '⊕',
    title: 'Making things exist',
    color: '#e0b8f0',
    tag: 'maker-first · side projects · shipped',
    prompt: `You are writing a 2–3 sentence first-person micro-story for a creative portfolio.
Write in the voice of Mahita Maddipati. She builds things because they don't exist yet — not because anyone assigned them. Projects include: a food gifting app (DoRupay Dosa), an AI career chatbot using RAG pipelines and LLMs (CareerCompass), geospatial incident maps from her Apple internship, and a stellar visualization from ESA data.
Tone: energetic, self-directed, a little defiant. No bullet points. No hashtags. No em-dashes. End with a line about why making is not optional for her.`
  }
};

const cache = {};
let activeId = null;

// ── Gemini streaming fetch ───────────────────────────────────────────────────
async function streamGemini(prompt, onChunk, onDone) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?alt=sse&key=${GEMINI_API_KEY}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.85, maxOutputTokens: 180 }
    })
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Gemini error ${res.status}: ${err}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let full = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const json = JSON.parse(data);
        const chunk = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
        if (chunk) { full += chunk; onChunk(full); }
      } catch {}
    }
  }
  onDone(full);
}

// ── Page load: generate bio ──────────────────────────────────────────────────
async function generateBio() {
  const el = document.getElementById('gemini-bio');
  const bioPrompt = `Write exactly two short lines (not a couplet, just two sentences) as a poetic byline for Mahita Maddipati's portfolio.
She is a software engineer, artist, researcher, and maker. South Indian. Moved away from home. Loves space, photography, dosas, and building things that don't exist yet.
Rules: first person. Lyrical but not flowery. No rhyme required. No em-dashes. No hashtags. Max 25 words total across both lines. Return only the two lines, nothing else.`;

  try {
    await streamGemini(
      bioPrompt,
      (text) => { el.innerHTML = text + '<span class="cursor-blink"></span>'; },
      (text) => { el.innerHTML = text; el.classList.add('loaded'); }
    );
  } catch (e) {
    el.innerHTML = 'Engineer. Artist. Maker of things that needed to exist.';
    el.classList.add('loaded');
  }
}

// ── Star click: show panel ───────────────────────────────────────────────────
async function showPanel(id) {
  if (activeId) document.getElementById('star-' + activeId).classList.remove('active');
  activeId = id;
  document.getElementById('star-' + id).classList.add('active');

  const d = stars[id];
  const panel = document.getElementById('info-panel');
  panel.style.opacity = '0';
  panel.style.borderColor = d.color + '40';

  await new Promise(r => setTimeout(r, 180));

  panel.innerHTML = `
    <span class="panel-glyph" style="color:${d.color}">${d.glyph}</span>
    <p class="panel-title">${d.title}</p>
    <p class="panel-body streaming" id="panel-body"><span class="loading-dots">thinking</span></p>
    <span class="panel-tag" style="color:${d.color}; border-color:${d.color}40">${d.tag}</span>
  `;
  panel.style.opacity = '1';

  const bodyEl = document.getElementById('panel-body');

  if (cache[id]) {
    bodyEl.innerHTML = cache[id];
    bodyEl.classList.remove('streaming');
    return;
  }

  try {
    await streamGemini(
      d.prompt,
      (text) => { bodyEl.innerHTML = text + '<span class="cursor-blink"></span>'; },
      (text) => {
        cache[id] = text;
        bodyEl.innerHTML = text;
        bodyEl.classList.remove('streaming');
      }
    );
  } catch (e) {
    bodyEl.innerHTML = 'Could not reach Gemini. Check your API key in the config at the top of this file.';
    bodyEl.classList.remove('streaming');
  }
}

// ── Starfield background ─────────────────────────────────────────────────────
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars_bg = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars_bg = Array.from({ length: 200 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 0.9 + 0.15,
    o: Math.random() * 0.35 + 0.05,
    speed: Math.random() * 0.003 + 0.001,
    phase: Math.random() * Math.PI * 2
  }));
}

function drawStarfield(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars_bg.forEach(s => {
    const flicker = s.o + Math.sin(t * s.speed * 60 + s.phase) * 0.1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,195,230,${Math.max(0, flicker)})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStarfield);
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
requestAnimationFrame(drawStarfield);

// ── Init ─────────────────────────────────────────────────────────────────────
generateBio();
</script>
